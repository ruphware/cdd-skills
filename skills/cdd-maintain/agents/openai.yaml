interface:
  display_name: "[CDD-5] Maintain"
  short_description: "Repo maintenance: Doc drift + upkeep, source cleanup, index refresh, and refactor architecture audit"
  default_prompt: "Use $cdd-maintain for repo maintenance. If the request is unclear, ask whether to do A. doc drift + upkeep, B. source cleanup, C. index, D. refactor, or do all. Allow multi-select, execute multiple selected modes in fixed order A -> B -> C -> D, keep A responsible for support-doc drift plus TODO/journal/archive/runtime upkeep, start B from tracked source/tests/configs/manifests/entrypoints and read docs or runtime only as candidate-specific proof, refresh docs/INDEX.md only in index mode, apply only approved source-cleanup removals, and keep refactor work as a read-only architecture audit that ends by recommending cdd-plan."
policy:
  allow_implicit_invocation: false
