interface:
  display_name: "[CDD-5] Maintain"
  short_description: "Repo maintenance: Doc drift, index refresh, codebase cleanup, refactor planning, and runtime upkeep"
  default_prompt: "Use $cdd-maintain for repo maintenance. If the request is unclear, ask whether to do A. doc drift, B. index, C. codebase cleanup, or D. refactor. Archive long TODO and journal files safely, audit support-doc drift, inspect repo-local .cdd-runtime for stale runtime artifacts or old managed worktrees, refresh docs/INDEX.md only in index mode, apply only approved codebase cleanup removals, and keep refactor work planning-only."
policy:
  allow_implicit_invocation: false
