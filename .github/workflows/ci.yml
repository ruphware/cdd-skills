name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bash syntax checks
        run: |
          bash -n scripts/install-common.sh
          bash -n scripts/install.sh
          bash -n scripts/install-openclaw.sh
          bash -n scripts/test_installers.sh
          bash -n scripts/test_codex_skill_smoke.sh
          bash -n scripts/test_master_chef_artifacts.sh
          bash -n scripts/test_master_chef_worktree.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Skill structure check
        run: python scripts/validate_skills.py

      - name: Installer smoke tests
        run: bash scripts/test_installers.sh

      - name: Master Chef artifact checks
        run: bash scripts/test_master_chef_artifacts.sh

      - name: Master Chef worktree tests
        run: bash scripts/test_master_chef_worktree.sh
